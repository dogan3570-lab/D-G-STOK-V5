services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dgstok-app
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: file:./data/prod.db
      JWT_SECRET: ${JWT_SECRET:-dgstok-v5-prod-key}
      JWT_EXPIRES_IN: 15m
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@dgstok.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ENABLE_SCHEDULER: "true"
    volumes:
      - sqlite_data:/app/prisma/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    restart: unless-stopped
    networks:
      - dgstok-network

  nginx:
    image: nginx:alpine
    container_name: dgstok-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - dgstok-network

volumes:
  sqlite_data:

networks:
  dgstok-network:
    driver: bridge
