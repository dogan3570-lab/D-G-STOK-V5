services:
  postgres:
    image: postgres:16-alpine
    container_name: dgstok-postgres
    environment:
      POSTGRES_DB: dg_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dgstok-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dgstok-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres123
      DB_DATABASE: dg_store
      DB_SYNCHRONIZE: "true"
      DB_LOGGING: "false"
      DB_POOL_SIZE: 20
      JWT_SECRET: dgstok-production-jwt-secret-key-min-32-chars!!
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: dgstok-production-refresh-secret-key-min-32-chars!!
      JWT_REFRESH_EXPIRES_IN: 7d
      MARKETPLACE_ENCRYPTION_SECRET: dgstok-encryption-secret-key-32-chars!!
      FRONTEND_URL: http://localhost
      CORS_ORIGIN: http://localhost,http://nginx
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 200
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dgstok-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dgstok-frontend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dgstok-network

  nginx:
    image: nginx:alpine
    container_name: dgstok-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - dgstok-network

volumes:
  postgres_data:

networks:
  dgstok-network:
    driver: bridge
